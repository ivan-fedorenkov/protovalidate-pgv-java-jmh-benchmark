syntax = "proto3";

package benchmark.pgv;

import "validate/validate.proto";
import "google/protobuf/timestamp.proto";

option java_package = "io.github.ivanfedorenkov.pgv";
option java_multiple_files = true;

message Address {
  string street = 1 [(validate.rules).string = {min_len: 3, max_len: 100}];
  string city = 2 [(validate.rules).string = {min_len: 2, max_len: 50}];
  string country = 3 [(validate.rules).string = {min_len: 2, max_len: 50}];
  string postal_code = 4 [(validate.rules).string = {pattern: "^[0-9A-Za-z-]{4,10}$"}];
}

message PersonCard {
  string id = 1 [(validate.rules).string = {min_len: 1, max_len: 36}];
  string first_name = 2 [(validate.rules).string = {min_len: 1, max_len: 50}];
  string last_name = 3 [(validate.rules).string = {min_len: 1, max_len: 50}];
  string middle_name = 4 [(validate.rules).string = {max_len: 50}];
  string email = 5 [(validate.rules).string = {email: true}];
  string phone = 6 [(validate.rules).string = {pattern: "^[0-9+\\-]{7,15}$"}];

  int32 age = 7 [(validate.rules).int32 = {gte: 0, lte: 150}];
  int64 salary = 8 [(validate.rules).int64 = {gte: 0}];
  int32 height_cm = 9 [(validate.rules).int32 = {gte: 30, lte: 300}];
  int32 weight_kg = 10 [(validate.rules).int32 = {gte: 1, lte: 500}];

  bool active = 11;

  google.protobuf.Timestamp created_at = 12 [(validate.rules).timestamp.required = true];
  google.protobuf.Timestamp updated_at = 13;

  Address address = 14 [(validate.rules).message.required = true];

  repeated string tags = 15 [(validate.rules).repeated = {min_items: 0, max_items: 20}];
  repeated string roles = 16 [(validate.rules).repeated = {min_items: 1, max_items: 10}];

  string company = 17 [(validate.rules).string = {max_len: 100}];
  string position = 18 [(validate.rules).string = {max_len: 100}];
  string department = 19 [(validate.rules).string = {max_len: 100}];

  int32 years_of_experience = 20 [(validate.rules).int32 = {gte: 0, lte: 80}];
  string bio = 21 [(validate.rules).string = {max_len: 500}];
}