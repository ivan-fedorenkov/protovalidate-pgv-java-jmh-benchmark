syntax = "proto3";

package benchmark.protovalidate;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

option java_package = "io.github.ivanfedorenkov.protovalidate";
option java_multiple_files = true;

message Address {
  string street = 1 [(buf.validate.field).string = {min_len: 3, max_len: 100}];
  string city = 2 [(buf.validate.field).string = {min_len: 2, max_len: 50}];
  string country = 3 [(buf.validate.field).string = {min_len: 2, max_len: 50}];
  string postal_code = 4 [(buf.validate.field).string = {pattern: "^[0-9A-Za-z-]{4,10}$"}];
}

message PersonCard {
  string id = 1 [(buf.validate.field).string = {min_len: 1, max_len: 36}];
  string first_name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 50}];
  string last_name = 3 [(buf.validate.field).string = {min_len: 1, max_len: 50}];
  string middle_name = 4 [(buf.validate.field).string = {max_len: 50}];
  string email = 5 [(buf.validate.field).string = {email: true}];
  string phone = 6 [(buf.validate.field).string = {pattern: "^[0-9+\\-]{7,15}$"}];

  int32 age = 7 [(buf.validate.field).int32 = {gte: 0, lte: 150}];
  int64 salary = 8 [(buf.validate.field).int64 = {gte: 0}];
  int32 height_cm = 9 [(buf.validate.field).int32 = {gte: 30, lte: 300}];
  int32 weight_kg = 10 [(buf.validate.field).int32 = {gte: 1, lte: 500}];

  bool active = 11;

  google.protobuf.Timestamp created_at = 12 [(buf.validate.field).required = true];
  google.protobuf.Timestamp updated_at = 13;

  Address address = 14 [(buf.validate.field).required = true];

  repeated string tags = 15 [(buf.validate.field).repeated = {min_items: 0, max_items: 20}];
  repeated string roles = 16 [(buf.validate.field).repeated = {min_items: 1, max_items: 10}];

  string company = 17 [(buf.validate.field).string = {max_len: 100}];
  string position = 18 [(buf.validate.field).string = {max_len: 100}];
  string department = 19 [(buf.validate.field).string = {max_len: 100}];

  int32 years_of_experience = 20 [(buf.validate.field).int32 = {gte: 0, lte: 80}];
  string bio = 21 [(buf.validate.field).string = {max_len: 500}];
}